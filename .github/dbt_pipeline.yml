name: Publish DBT Project

on:
  push:
    branches:
      - master
    paths:
      - "DBT/data_product_demo/**"
      - ".github/dbt_pipeline.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dbt-project:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.email "nima@farhang.io"
          git config --global user.name "Nima-Farhang"

      - name: Prepare dbt_prod worktree
        run: |
          git fetch origin dbt_prod || true

          if git ls-remote --exit-code --heads origin dbt_prod >/dev/null 2>&1; then
            git worktree add /tmp/dbt_prod origin/dbt_prod
          else
            git worktree add -b dbt_prod /tmp/dbt_prod
            cd /tmp/dbt_prod
            git commit --allow-empty -m "Initialize dbt_prod branch"
            git push --set-upstream origin dbt_prod
          fi

      - name: Sync DBT project into dbt_prod
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            DBT/data_product_demo/ /tmp/dbt_prod/

      - name: Commit and push changes
        run: |
          cd /tmp/dbt_prod
          git add --all

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Publish DBT project from ${GITHUB_SHA}"
          git push origin HEAD:dbt_prod

      - name: Clean up worktree
        if: always()
        run: git worktree remove /tmp/dbt_prod --force
