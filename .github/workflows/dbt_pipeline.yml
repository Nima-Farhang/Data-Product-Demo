name: DBT CI

on:
  pull_request:
    paths:
      - "DBT/data_product_demo/**"
      - ".github/workflows/dbt_pipeline.yml"
  push:
    branches:
      - master
    paths:
      - "DBT/data_product_demo/**"
      - ".github/workflows/dbt_pipeline.yml"

jobs:
  dbt-validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DBT/data_product_demo

    env:
      ENVIRONMENT: PROD
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DBT_DATA_PRODUCT_PASS: ${{ secrets.DBT_DATA_PRODUCT_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install dbt-core dbt-snowflake

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          data_product_demo:
            outputs:
              prod:
                account: ${SNOWFLAKE_ACCOUNT}
                database: ${ENVIRONMENT}_DATA_PRODUCT_DB
                password: ${DBT_DATA_PRODUCT_PASS}
                role: ACCOUNTADMIN
                schema: RAW
                threads: 1
                type: snowflake
                user: SVC_${ENVIRONMENT}_DBT_DATA_PRODUCT
                warehouse: ${ENVIRONMENT}_DATA_PRODUCT_DB_WH
            target: prod
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt compile
        run: dbt compile

  dbt-prod-run:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prod

    defaults:
      run:
        working-directory: DBT/data_product_demo

    env:
      ENVIRONMENT: PROD
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DBT_DATA_PRODUCT_PASS: ${{ secrets.DBT_DATA_PRODUCT_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install dbt-core dbt-snowflake

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          data_product_demo:
            outputs:
              prod:
                account: ${SNOWFLAKE_ACCOUNT}
                database: ${ENVIRONMENT}_DATA_PRODUCT_DB
                password: ${DBT_DATA_PRODUCT_PASS}
                role: ACCOUNTADMIN
                schema: RAW
                threads: 1
                type: snowflake
                user: SVC_${ENVIRONMENT}_DBT_DATA_PRODUCT
                warehouse: ${ENVIRONMENT}_DATA_PRODUCT_DB_WH
            target: prod
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt seed
        run: dbt seed

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test
