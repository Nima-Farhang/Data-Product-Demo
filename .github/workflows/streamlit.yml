name: Streamlit CI

on:
  pull_request:
    paths:
      - "STREAMLIT/**"
      - ".github/workflows/streamlit.yml"
  push:
    branches:
      - master
    paths:
      - "STREAMLIT/**"
      - ".github/workflows/streamlit.yml"

jobs:
  streamlit-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prod

    env:
      ENVIRONMENT: PROD
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DBT_DATA_PRODUCT_PASS: ${{ secrets.DBT_DATA_PRODUCT_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Snowflake CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel snowflake-cli-labs

      - name: Create Snowflake config
        run: |
          SNOWFLAKE_DIRECTORY="${HOME}/.snowflake"

          mkdir -p "${SNOWFLAKE_DIRECTORY}/logs"

          cat > "${SNOWFLAKE_DIRECTORY}/config.toml" <<EOF
          [cli.logs]
          save_logs = true
          path = "${SNOWFLAKE_DIRECTORY}/logs"
          level = "info"

          [connections.default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "SVC_${ENVIRONMENT}_DBT_DATA_PRODUCT"
          password = "${DBT_DATA_PRODUCT_PASS}"
          role = "ACCOUNTADMIN"
          warehouse = "${ENVIRONMENT}_DATA_PRODUCT_DB_WH"
          database = "${ENVIRONMENT}_DATA_PRODUCT_DB"
          schema = "RAW"
          EOF

          chmod 0600 "${SNOWFLAKE_DIRECTORY}/config.toml"

      - name: Test Snowflake connection
        run: snow connection test

      - name: Deploy Streamlit apps
        run: bash STREAMLIT/deploy_streamlit_apps.sh
