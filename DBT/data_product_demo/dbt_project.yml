name: "data_product_demo"
version: "1.0"
config-version: 2

profile: "data_product_demo"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_product_demo:
    staging:
      +schema: STAGING
      +materialized: view

    marts:
      +schema: ANALYTICS
      +materialized: table

seeds:
  data_product_demo:
    +schema: RAW
